<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>P1 – Spiller</title>

<style>
@font-face{
  font-family:'Schoulschrëft';
  src:url('https://raw.githubusercontent.com/albrechtclaire1007/schoulschreft/main/schoulschreft_bold%5B2%5D.TTF') format('truetype');
  font-weight:bold; font-style:normal; font-display:swap;
}

:root{
  --pink-mid:#e4b7d0;
  --pink-light:#f6e4ee;
  --pink-dark:#d88cb8;

  --ink:#1f1f1f;
  --white:#fff;
  --bad:#ffcccc;
  --ok:#b7f0c8;

  --border:3px;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --pad:clamp(10px,2.2vw,16px);
  --r:18px;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; outline:none;}
html,body{
  height:100%; margin:0;
  background:linear-gradient(135deg,var(--pink-mid),var(--pink-light));
  color:var(--ink);
  font-family:'Schoulschrëft', Arial, sans-serif;
}

.hidden{display:none!important;}

/* ===== top nav ===== */
.top{
  position:sticky; top:8px; z-index:10;
  display:flex; gap:10px; justify-content:center; align-items:center;
  background:var(--white);
  border:var(--border) solid var(--pink-dark);
  border-radius:16px;
  padding:.28rem .7rem;
  margin:10px auto;
  width:fit-content;
  box-shadow:var(--shadow);
}
.iconBtn{
  border:var(--border) solid var(--ink);
  background:var(--white);
  padding:.2rem .55rem;
  border-radius:12px;
  cursor:pointer;
  font-size:1.25rem;
  line-height:1;
  min-width:2.35rem;
  display:grid;
  place-items:center;
  font-family:'Schoulschrëft', Arial, sans-serif;
}
.iconBtn:active{transform:scale(.98);}
#flowLabel{font-size:1.05rem; opacity:.9;}

/* ===== sections ===== */
.wrap{
  min-height:calc(100vh - 70px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.1rem;
  padding:var(--pad);
}
h1{
  margin:.2rem 0;
  text-align:center;
  font-size:clamp(1.6rem,3.8vw,2.6rem);
}

/* ===== transparent image layouts for game 1 ===== */
.transparentGrid{
  width:min(1200px,96vw);
  display:grid;
  gap:clamp(1rem,2vw,1.6rem);
  justify-items:center;
  align-items:center;
  grid-template-columns:repeat(4, minmax(120px,1fr));
  margin-top:clamp(10px,2vh,22px);
}
@media (max-width:900px){
  .transparentGrid{grid-template-columns:repeat(3, minmax(110px,1fr));}
}
@media (max-width:620px){
  .transparentGrid{grid-template-columns:repeat(2, minmax(120px,1fr));}
}

.plainToken{
  background:transparent;
  border:none;
  aspect-ratio:auto;
  display:grid;
  place-items:center;
  cursor:pointer;
  transition:transform .08s ease;
  min-height:120px;
}
.plainToken:active{transform:scale(.97);}
.plainToken img{
  width:min(100%, 210px);
  height:auto;
  max-height:150px;
  object-fit:contain;
  display:block;
}
@media (max-width:620px){
  .plainToken img{
    width:min(100%, 180px);
    max-height:130px;
  }
}

/* ===== game 4 ordered line ===== */
.weekLine{
  width:min(1400px,98vw);
  display:grid;
  grid-template-columns:repeat(7, minmax(110px,1fr));
  gap:clamp(.6rem,1.2vw,1rem);
  align-items:end;
  justify-items:center;
  margin-top:clamp(10px,2vh,22px);
}
@media (max-width:1200px){
  .weekLine{
    grid-template-columns:repeat(7, minmax(90px,1fr));
    gap:.5rem;
  }
}
@media (max-width:860px){
  .weekLine{
    grid-template-columns:repeat(4, minmax(100px,1fr));
  }
}
@media (max-width:520px){
  .weekLine{
    grid-template-columns:repeat(2, minmax(120px,1fr));
  }
}

.flash-good{filter:drop-shadow(0 0 0.55rem rgba(71,190,110,.65));}
.flash-bad{filter:drop-shadow(0 0 0.55rem rgba(255,90,90,.6));}

.btn{
  border:var(--border) solid var(--ink);
  background:var(--white);
  border-radius:14px;
  padding:.4rem .85rem;
  cursor:pointer;
  font-family:'Schoulschrëft', Arial, sans-serif;
  font-size:1.05rem;
  box-shadow:var(--shadow);
}
.btn:active{transform:scale(.98);}

/* ===== memory (ORIGINAL LOOK) ===== */
.memGrid{
  width:min(980px,96vw);
  display:grid;
  gap:clamp(.6rem,1.8vw,1rem);
  grid-template-columns:repeat(4, minmax(0, 1fr));
}
@media (max-width:780px){ .memGrid{grid-template-columns:repeat(3,1fr);} }
@media (max-width:520px){ .memGrid{grid-template-columns:repeat(2,1fr);} }

.card{aspect-ratio:5/3; perspective:1000px; cursor:pointer;}
.inner{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .28s ease;}
.flipped .inner{transform:rotateY(180deg);}
.face{
  position:absolute; inset:0;
  border-radius:16px;
  border:5px solid var(--pink-mid);
  background:#fff;
  display:grid;
  place-items:center;
  backface-visibility:hidden;
  box-shadow:var(--shadow);
}
.front{
  background:#fff url('https://i.postimg.cc/ZKkYXy7g/cardback-p1-game.png') center/68% no-repeat;
}
.back{transform:rotateY(180deg);}
.memWord{
  font-size:clamp(1.25rem,3.3vmin,1.8rem);
  text-align:center;
  padding:.4rem;
  line-height:1.15;
}
.memSoundBtn{
  width:min(70%,120px);
  height:auto;
  object-fit:contain;
  display:block;
}

/* ===== game 3 ===== */
.orderSlots{
  width:min(980px,96vw);
  display:grid;
  gap:clamp(.55rem,1.6vw,1rem);
  grid-template-columns:repeat(7,minmax(0,1fr));
}
@media (max-width:860px){
  .orderSlots{grid-template-columns:repeat(4,minmax(0,1fr));}
}
@media (max-width:520px){
  .orderSlots{grid-template-columns:repeat(2,minmax(0,1fr));}
}

.orderBank{
  width:min(980px,96vw);
  display:grid;
  gap:clamp(.55rem,1.6vw,1rem);
  grid-template-columns:repeat(4,minmax(0,1fr));
}
@media (max-width:860px){
  .orderBank{grid-template-columns:repeat(3,minmax(0,1fr));}
}
@media (max-width:520px){
  .orderBank{grid-template-columns:repeat(2,minmax(0,1fr));}
}

.orderSlot{
  background:var(--white);
  border:5px dashed var(--pink-mid);
  border-radius:18px;
  aspect-ratio:1/1;
  display:grid;
  place-items:center;
  cursor:pointer;
  box-shadow:var(--shadow);
}
.orderSlot img{
  width:82%;
  height:82%;
  object-fit:contain;
}
.orderBankItem{
  background:var(--white);
  border:5px solid var(--pink-mid);
  border-radius:18px;
  aspect-ratio:1/1;
  display:grid;
  place-items:center;
  cursor:pointer;
  box-shadow:var(--shadow);
}
.orderBankItem img{
  width:82%;
  height:82%;
  object-fit:contain;
}

.fade{animation:fadeIn .25s ease;}
@keyframes fadeIn{
  from{opacity:0; transform:scale(.92)}
  to{opacity:1; transform:scale(1)}
}
</style>
</head>

<body>

<div class="top">
  <button class="iconBtn" id="prev" aria-label="virdrun">◀</button>
  <span id="flowLabel">1. Spill</span>
  <button class="iconBtn" id="next" aria-label="nächst">▶</button>
</div>

<!-- GAME 1 -->
<section class="wrap" id="g1">
  <h1>Lauschter a klick</h1>
  <div class="transparentGrid" id="grid1"></div>
  <button class="btn" id="play1">Toun nach eng Kéier</button>
</section>

<!-- GAME 2 -->
<section class="wrap hidden" id="g2">
  <h1>Memory</h1>
  <div class="memGrid" id="memGrid"></div>
  <button class="btn" id="memReset">↻ Reset</button>
</section>

<!-- GAME 3 -->
<section class="wrap hidden" id="g3">
  <h1>Setz d'Wochendeeg an déi richteg Reiefolleg</h1>
  <div class="orderSlots" id="orderSlots"></div>
  <div class="orderBank" id="orderBank"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="btn" id="orderReset">↻ Reset</button>
    <button class="btn" id="orderCheck">Kontrolléieren</button>
  </div>
</section>

<!-- GAME 4 -->
<section class="wrap hidden" id="g4">
  <h1>Haut ass … wat war gëschter / ass muer?</h1>
  <div id="promptText" style="font-size:clamp(1.2rem,3vw,1.8rem);text-align:center;min-height:2.2rem;">Lauschter gutt.</div>
  <div class="weekLine" id="grid4"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="btn" id="promptPlay">Toun spillen</button>
    <button class="btn" id="nextPrompt">Nei Fro</button>
  </div>
</section>

<audio id="speaker" preload="auto"></audio>

<script>
const AUDIO_BASE = "https://github.com/albrechtclaire1007/p1wochendeegameint/raw/refs/heads/main/";

const ITEMS = [
  { id:'meinden',     word:'Méinden',     img:'https://i.postimg.cc/Jt87CMR7/33.png', audio:'MEINDEN.mp3' },
  { id:'denschden',   word:'Dënschden',   img:'https://i.postimg.cc/Cd0MpSwd/34.png', audio:'DENSCHDEN.mp3' },
  { id:'mettwoch',    word:'Mëttwoch',    img:'https://i.postimg.cc/z3NDY8qB/35.png', audio:'METTWOCH.mp3' },
  { id:'donneschden', word:'Donneschden', img:'https://i.postimg.cc/w3zxYg9M/36.png', audio:'DONNESCHDEN .mp3' },
  { id:'freiden',     word:'Freiden',     img:'https://i.postimg.cc/Thx2vfTp/37.png', audio:'FREIDEN.mp3' },
  { id:'samschden',   word:'Samschden',   img:'https://i.postimg.cc/Sj4Qbkmn/38.png', audio:'SAMSCHDEN.mp3' },
  { id:'sonnden',     word:'Sonnden',     img:'https://i.postimg.cc/NLtGvBQ9/39.png', audio:'SONNDEN.mp3' }
];

const speaker = document.getElementById('speaker');

function playAudio(filename){
  if(!filename) return Promise.resolve();
  const src = AUDIO_BASE + filename;
  return new Promise(resolve=>{
    try{
      speaker.pause();
      speaker.currentTime = 0;
      speaker.src = src;
      const done = ()=>{
        speaker.removeEventListener('ended', done);
        speaker.removeEventListener('error', done);
        resolve();
      };
      speaker.addEventListener('ended', done, {once:true});
      speaker.addEventListener('error', done, {once:true});
      const p = speaker.play();
      if(p && typeof p.then === 'function') p.catch(()=>resolve());
    }catch(e){
      resolve();
    }
  });
}

async function playSequence(files, gap=220){
  for(let i=0;i<files.length;i++){
    await playAudio(files[i]);
    if(i < files.length - 1) await wait(gap);
  }
}

function wait(ms){
  return new Promise(r=>setTimeout(r, ms));
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function flash(el, ok=true){
  el.classList.remove('flash-good','flash-bad');
  void el.offsetWidth;
  el.classList.add(ok ? 'flash-good' : 'flash-bad');
  setTimeout(()=>el.classList.remove('flash-good','flash-bad'), 280);
}

/* ================= NAV ================= */
const pages = ['g1','g2','g3','g4'];
let p = 0;

document.getElementById('prev').onclick = ()=>show(p-1);
document.getElementById('next').onclick = ()=>show(p+1);

function show(i){
  p = Math.max(0, Math.min(pages.length-1, i));
  pages.forEach((id,n)=>document.getElementById(id).classList.toggle('hidden', n !== p));
  document.getElementById('flowLabel').textContent = (p+1) + '. Spill';
}
show(0);

/* ================= GAME 1 ================= */
const grid1 = document.getElementById('grid1');
let g1bag = [];
let g1target = null;

function initG1(){
  grid1.innerHTML = '';
  shuffle(ITEMS).forEach(it=>{
    const b = document.createElement('div');
    b.className = 'plainToken';
    b.innerHTML = `<img src="${it.img}" alt="${it.word}">`;
    b.onclick = ()=>{
      if(!g1target) return;
      const ok = it.id === g1target.id;
      flash(b, ok);
      if(ok) setTimeout(nextG1, 280);
    };
    grid1.appendChild(b);
  });
  g1bag = shuffle(ITEMS);
  nextG1();
}

function nextG1(){
  if(g1bag.length === 0) g1bag = shuffle(ITEMS);
  g1target = g1bag.pop();
  playAudio(g1target.audio);
}

document.getElementById('play1').onclick = ()=>g1target && playAudio(g1target.audio);
initG1();

/* ================= GAME 2: MEMORY (ORIGINAL LOOK, NEW CONTENT) ================= */
const memGrid = document.getElementById('memGrid');
const memReset = document.getElementById('memReset');
let memFirst = null;
let memLock = false;
let memMatched = 0;

function buildMemory(){
  memGrid.innerHTML = '';
  memFirst = null;
  memLock = false;
  memMatched = 0;

  const base = shuffle(ITEMS).slice(0, Math.min(7, ITEMS.length));
  const deck = shuffle(base.flatMap(it=>[
    { key:it.id, type:'sound', it },
    { key:it.id, type:'word', it }
  ]));

  deck.forEach(c=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.key = c.key;
    card.dataset.type = c.type;

    const backContent = (c.type === 'sound')
      ? `<img src="https://i.postimg.cc/8cYkK9CZ/p1lauschter.png" class="memSoundBtn" alt="">`
      : `<div class="memWord">${c.it.word}</div>`;

    card.innerHTML = `
      <div class="inner">
        <div class="face front"></div>
        <div class="face back">${backContent}</div>
      </div>
    `;

    card.onclick = ()=>flipCard(card, c);
    memGrid.appendChild(card);
  });
}

function flipCard(card, c){
  if(memLock) return;
  if(card.classList.contains('matched')) return;
  if(card.classList.contains('flipped')) return;

  card.classList.add('flipped');

  if(c.type === 'sound') playAudio(c.it.audio);

  if(!memFirst){
    memFirst = { card, c };
    return;
  }

  memLock = true;
  const a = memFirst;
  const b = { card, c };
  const isMatch = a.c.key === b.c.key && a.c.type !== b.c.type;

  if(isMatch){
    a.card.classList.add('matched');
    b.card.classList.add('matched');
    memMatched++;
    memFirst = null;
    memLock = false;
  }else{
    setTimeout(()=>{
      a.card.classList.remove('flipped');
      b.card.classList.remove('flipped');
      memFirst = null;
      memLock = false;
    }, 650);
  }
}

memReset.onclick = buildMemory;
buildMemory();

/* ================= GAME 3 ================= */
const orderSlots = document.getElementById('orderSlots');
const orderBank = document.getElementById('orderBank');
const orderReset = document.getElementById('orderReset');
const orderCheck = document.getElementById('orderCheck');

let selectedOrderItem = null;
let placedOrder = [null,null,null,null,null,null,null];
let bankOrder = [];

function orderTokenHTML(it){
  return `<img src="${it.img}" alt="${it.word}">`;
}

function buildOrder(){
  selectedOrderItem = null;
  placedOrder = [null,null,null,null,null,null,null];
  bankOrder = shuffle(ITEMS);

  orderSlots.innerHTML = '';
  orderBank.innerHTML = '';

  ITEMS.forEach((_, idx)=>{
    const slot = document.createElement('div');
    slot.className = 'orderSlot';
    slot.dataset.idx = idx;
    slot.innerHTML = `<div style="font-size:1.6rem;opacity:.45;">${idx+1}</div>`;
    slot.onclick = ()=>{
      const i = Number(slot.dataset.idx);
      if(placedOrder[i]){
        const backItem = placedOrder[i];
        placedOrder[i] = null;
        selectedOrderItem = backItem;
        renderOrderBank();
        renderOrderSlots();
      }else if(selectedOrderItem){
        placedOrder[i] = selectedOrderItem;
        selectedOrderItem = null;
        renderOrderBank();
        renderOrderSlots();
      }
    };
    orderSlots.appendChild(slot);
  });

  renderOrderBank();
  renderOrderSlots();
}

function renderOrderBank(){
  orderBank.innerHTML = '';
  const remaining = bankOrder.filter(it=>!placedOrder.some(p=>p && p.id === it.id));
  remaining.forEach(it=>{
    const b = document.createElement('div');
    b.className = 'orderBankItem';
    b.style.borderColor = selectedOrderItem && selectedOrderItem.id === it.id ? 'var(--pink-dark)' : 'var(--pink-mid)';
    b.innerHTML = orderTokenHTML(it);
    b.onclick = ()=>{
      selectedOrderItem = it;
      playAudio(it.audio);
      renderOrderBank();
    };
    orderBank.appendChild(b);
  });
}

function renderOrderSlots(){
  [...orderSlots.children].forEach((slot, idx)=>{
    const it = placedOrder[idx];
    if(it){
      slot.style.borderStyle = 'solid';
      slot.innerHTML = orderTokenHTML(it);
      slot.onclick = ()=>{
        selectedOrderItem = it;
        placedOrder[idx] = null;
        renderOrderBank();
        renderOrderSlots();
        playAudio(it.audio);
      };
    }else{
      slot.style.borderStyle = 'dashed';
      slot.innerHTML = `<div style="font-size:1.6rem;opacity:.45;">${idx+1}</div>`;
      slot.onclick = ()=>{
        if(selectedOrderItem){
          placedOrder[idx] = selectedOrderItem;
          selectedOrderItem = null;
          renderOrderBank();
          renderOrderSlots();
        }
      };
    }
  });
}

orderReset.onclick = buildOrder;
orderCheck.onclick = ()=>{
  let allOk = true;
  [...orderSlots.children].forEach((slot, idx)=>{
    const ok = placedOrder[idx] && placedOrder[idx].id === ITEMS[idx].id;
    flash(slot, !!ok);
    if(!ok) allOk = false;
  });
  if(allOk) setTimeout(buildOrder, 650);
};
buildOrder();

/* ================= GAME 4 ================= */
const grid4 = document.getElementById('grid4');
const promptPlay = document.getElementById('promptPlay');
const nextPrompt = document.getElementById('nextPrompt');
const promptText = document.getElementById('promptText');

let g4currentDay = null;
let g4mode = 'geschter';
let g4answer = null;
let g4busy = false;

function buildG4Grid(){
  grid4.innerHTML = '';
  ITEMS.forEach(it=>{
    const b = document.createElement('div');
    b.className = 'plainToken';
    b.innerHTML = `<img src="${it.img}" alt="${it.word}">`;
    b.onclick = ()=>{
      if(!g4answer || g4busy) return;
      const ok = it.id === g4answer.id;
      flash(b, ok);
      if(ok) setTimeout(newPrompt, 500);
    };
    grid4.appendChild(b);
  });
}

function prevDay(item){
  const idx = ITEMS.findIndex(x=>x.id === item.id);
  return ITEMS[(idx - 1 + ITEMS.length) % ITEMS.length];
}

function nextDay(item){
  const idx = ITEMS.findIndex(x=>x.id === item.id);
  return ITEMS[(idx + 1) % ITEMS.length];
}

async function playPrompt(){
  if(!g4currentDay) return;
  g4busy = true;
  const modeAudio = g4mode === 'geschter' ? 'p1_geschter_war.mp3' : 'p1_muer_ass.mp3';
  await playSequence(['p1_haut_ass.mp3', g4currentDay.audio, modeAudio], 260);
  g4busy = false;
}

function newPrompt(){
  g4currentDay = ITEMS[Math.floor(Math.random() * ITEMS.length)];
  g4mode = Math.random() < 0.5 ? 'geschter' : 'muer';
  g4answer = g4mode === 'geschter' ? prevDay(g4currentDay) : nextDay(g4currentDay);
  promptText.textContent = g4mode === 'geschter'
    ? 'Lauschter: Haut ass … Wat war gëschter?'
    : 'Lauschter: Haut ass … Wat ass muer?';
  playPrompt();
}

promptPlay.onclick = ()=>playPrompt();
nextPrompt.onclick = ()=>newPrompt();

buildG4Grid();
newPrompt();
</script>

</body>
</html>
